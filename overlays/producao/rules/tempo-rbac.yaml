apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-tempo
  namespace: grafana
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-tempo-token
  namespace: grafana
  annotations:
    kubernetes.io/service-account.name: grafana-tempo
    argocd.argoproj.io/sync-wave: "3"
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: tempo-dev-traces-reader
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups:
      - tempo.grafana.com
    resources:
      - dev
    resourceNames:
      - traces
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tempo-dev-traces-reader-grafana
  annotations:
    argocd.argoproj.io/sync-wave: "3"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tempo-dev-traces-reader
subjects:
  - kind: ServiceAccount
    name: grafana-tempo
    namespace: grafana
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:authenticated
